name: deploy

on: [push]
#  push:
#    tags:
#      - v*

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: 'read'
    steps:
      # Setup

      - uses: actions/checkout@v6

      - name: Get the version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            # Tag => déploiement en production (promotion du trafic)
            echo "VERSION=$(echo $GITHUB_REF | cut -d / -f 3)" >> $GITHUB_OUTPUT
            echo "PROMOTE=true" >> $GITHUB_OUTPUT
          else
            # Push hors tag => version temporaire par branche, sans promotion du trafic.
            # Une seule version (URL stable) par branche, écrasée à chaque push.
            # Nom de version App Engine: [a-z0-9-], <= 63 car. On dérive du nom de branche.
            BRANCH=$(echo "${GITHUB_REF#refs/heads/}" | tr '[:upper:]/_.' '[:lower:]----' | tr -cd 'a-z0-9-' | cut -c1-50)
            echo "VERSION=tmp-${BRANCH}" >> $GITHUB_OUTPUT
            echo "PROMOTE=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: 24

      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/849551145524/locations/global/workloadIdentityPools/github/providers/github'
          service_account: 'github-actions@devfest2027.iam.gserviceaccount.com'

      # Build
      - run: npm ci --verbose
      - run: npm run build

      # Deploy static files to App Engine
      - run: cp .appengine/app.yaml out/app.yaml

      - id: 'deploy'
        name: 'Deploy to App Engine'
        uses: 'google-github-actions/deploy-appengine@v3'
        with:
          working_directory: 'out'
          promote: ${{ steps.get_version.outputs.PROMOTE }}
          version: ${{ steps.get_version.outputs.VERSION }}
          project_id: 'devfest2027'

      # Lien vers la version temporaire dans le résumé du job, si la branche a une PR ouverte
      - name: 'PR preview link'
        if: steps.get_version.outputs.PROMOTE == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_URL: ${{ steps.deploy.outputs.version_url }}
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          PR_URL=$(gh pr list --head "$GITHUB_REF_NAME" --state open --json url --jq '.[0].url')
          if [ -n "$PR_URL" ]; then
            {
              echo "## 🚀 Déploiement temporaire"
              echo ""
              echo "Version \`$VERSION\` déployée sans promotion du trafic."
              echo ""
              echo "🔗 **Aperçu :** $VERSION_URL"
              echo ""
              echo "PR associée : $PR_URL"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
