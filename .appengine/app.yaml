runtime: python312

automatic_scaling:
  max_instances: 2

error_handlers:
  - file: 404.html

handlers:
  # Serve _astro/ build assets with aggressive caching (hashed filenames)
  - url: /_astro
    static_dir: _astro
    secure: always
    expiration: '365d'

  # Serve static assets at root (favicon, images, robots.txt, sitemap, etc.)
  - url: /(.*\..+)$
    static_files: \1
    upload: (.+\..+)$
    secure: always
    expiration: '1d'

  # Serve root / -> index.html (meta refresh to /fr)
  - url: /$
    static_files: index.html
    upload: index\.html
    secure: always

  # Serve directory-style HTML pages (e.g. /fr/team -> fr/team/index.html)
  - url: /(.+)/
    static_files: \1/index.html
    upload: (.+)/index\.html$
    secure: always

  # Serve directory-style HTML pages without trailing slash (e.g. /fr/team -> fr/team/index.html)
  - url: /(.+)
    static_files: \1/index.html
    upload: (.+)/index\.html$
    secure: always
